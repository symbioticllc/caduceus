# Dragonboat 3-node gossip cluster
#
# ── How it works ──────────────────────────────────────────────────────────────
#
# Each node has:
#   - A stable NodeHostID (UUID set via DRAGONBOAT_NODE_HOST_ID env var)
#   - A dynamic RaftAddress (the Docker container IP changes on restart)
#   - A gossip agent that keeps every node informed of others' current IPs
#
# The Raft cluster tolerates losing any 1 of the 3 nodes and continues
# to make progress. When the failed node restarts, gossip re-advertises
# its new address and Dragonboat replays missing log entries automatically.
#
# ── Bootstrap (first run) ─────────────────────────────────────────────────────
#
#   docker compose up
#
# ── Simulate a node failure ───────────────────────────────────────────────────
#
#   docker compose stop node3      # kill one node (quorum = 2 of 3 still alive)
#
#   # Writes still work:
#   curl -X POST http://localhost:8081/v1/shards/1/propose \
#        -d '{"command":"eyJvcCI6InNldCIsImtleSI6ImZvbyIsInZhbHVlIjoiYmFyIn0="}'
#
#   docker compose start node3     # node auto-rejoins, catches up via log replay
#
# ── Scale out (add node4) ─────────────────────────────────────────────────────
#
#   1. docker compose run --rm node4   (see node4 service below, disabled by default)
#   2. curl -X POST http://localhost:8081/v1/shards/1/replicas \
#           -d '{"replica_id": 4, "target": "nhid-node4"}'
#
# ── Notes ─────────────────────────────────────────────────────────────────────
#  - --initial-members only matters on the very first boot.  Dragonboat
#    persists bootstrap info in --data-dir; subsequent restarts auto-recover.
#  - Gossip seeds only need to reach ONE live node.  All other nodes are
#    discovered transitively via gossip propagation.
#  - Set DRAGONBOAT_NODE_HOST_ID to a stable UUID per node.  Here we use
#    pre-defined UUIDs so you can reference them in --initial-members.
#    In Kubernetes, map a pod's stable ordinal name to a UUID stored in a
#    ConfigMap or Secret.

version: "3.9"

x-common: &common
  build:
    context: ..
    dockerfile: deployments/Dockerfile
  restart: on-failure:5
  networks:
    - raftnet

x-gossip-seeds: &seeds "node1:63002,node2:63002,node3:63002"

services:

  # ── Node 1 ──────────────────────────────────────────────────────────────────
  node1:
    <<: *common
    hostname: node1
    container_name: dragonboat-node1
    volumes:
      - node1-data:/data
    ports:
      - "8080:8080"   # gRPC  (primary endpoint)
      - "8081:8081"   # REST  (primary endpoint)
    environment:
      DRAGONBOAT_GOSSIP: "true"
      DRAGONBOAT_NODE_HOST_ID: "nhid-11111111-1111-1111-1111-111111111111"
      DRAGONBOAT_GOSSIP_SEEDS: *seeds
    command: >
      --node-id=1
      --shard-id=1
      --raft-addr=node1:63001
      --gossip-addr=0.0.0.0:63002
      --gossip-advertise=node1:63002
      --grpc-addr=:8080
      --rest-addr=:8081
      --data-dir=/data
      --rtt-ms=5
      --initial-members=1=nhid-11111111-1111-1111-1111-111111111111,2=nhid-22222222-2222-2222-2222-222222222222,3=nhid-33333333-3333-3333-3333-333333333333

  # ── Node 2 ──────────────────────────────────────────────────────────────────
  node2:
    <<: *common
    hostname: node2
    container_name: dragonboat-node2
    volumes:
      - node2-data:/data
    ports:
      - "8082:8080"   # gRPC
      - "8083:8081"   # REST
    environment:
      DRAGONBOAT_GOSSIP: "true"
      DRAGONBOAT_NODE_HOST_ID: "nhid-22222222-2222-2222-2222-222222222222"
      DRAGONBOAT_GOSSIP_SEEDS: *seeds
    command: >
      --node-id=2
      --shard-id=1
      --raft-addr=node2:63001
      --gossip-addr=0.0.0.0:63002
      --gossip-advertise=node2:63002
      --grpc-addr=:8080
      --rest-addr=:8081
      --data-dir=/data
      --rtt-ms=5
      --initial-members=1=nhid-11111111-1111-1111-1111-111111111111,2=nhid-22222222-2222-2222-2222-222222222222,3=nhid-33333333-3333-3333-3333-333333333333

  # ── Node 3 ──────────────────────────────────────────────────────────────────
  node3:
    <<: *common
    hostname: node3
    container_name: dragonboat-node3
    volumes:
      - node3-data:/data
    ports:
      - "8084:8080"   # gRPC
      - "8085:8081"   # REST
    environment:
      DRAGONBOAT_GOSSIP: "true"
      DRAGONBOAT_NODE_HOST_ID: "nhid-33333333-3333-3333-3333-333333333333"
      DRAGONBOAT_GOSSIP_SEEDS: *seeds
    command: >
      --node-id=3
      --shard-id=1
      --raft-addr=node3:63001
      --gossip-addr=0.0.0.0:63002
      --gossip-advertise=node3:63002
      --grpc-addr=:8080
      --rest-addr=:8081
      --data-dir=/data
      --rtt-ms=5
      --initial-members=1=nhid-11111111-1111-1111-1111-111111111111,2=nhid-22222222-2222-2222-2222-222222222222,3=nhid-33333333-3333-3333-3333-333333333333

  # ── Node 4 (disabled — scale-out example) ──────────────────────────────────
  # To add a fourth node:
  #   docker compose run --rm --service-ports node4
  #   curl -X POST http://localhost:8081/v1/shards/1/replicas \
  #        -d '{"replica_id": 4, "target": "nhid-44444444-4444-4444-4444-444444444444"}'
  node4:
    <<: *common
    hostname: node4
    container_name: dragonboat-node4
    profiles: ["scale-out"]   # only starts when explicitly requested
    volumes:
      - node4-data:/data
    ports:
      - "8086:8080"
      - "8087:8081"
    environment:
      DRAGONBOAT_GOSSIP: "true"
      DRAGONBOAT_NODE_HOST_ID: "nhid-44444444-4444-4444-4444-444444444444"
      DRAGONBOAT_GOSSIP_SEEDS: *seeds
    command: >
      --node-id=4
      --shard-id=1
      --raft-addr=node4:63001
      --gossip-addr=0.0.0.0:63002
      --gossip-advertise=node4:63002
      --grpc-addr=:8080
      --rest-addr=:8081
      --data-dir=/data
      --rtt-ms=5
      --join

networks:
  raftnet:
    driver: bridge

volumes:
  node1-data:
  node2-data:
  node3-data:
  node4-data:
