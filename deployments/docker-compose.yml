# Dragonboat 3-node gossip cluster — Redis-backed state machine
#
# Each Dragonboat node has its own local Redis instance (redis1/2/3).
# Replication is handled by Raft; Redis is the materialized state store.
#
# ── Bootstrap (first run) ─────────────────────────────────────────────────────
#
#   docker compose up --build
#
# ── Verify Redis is receiving writes ─────────────────────────────────────────
#
#   # Write via REST
#   curl -X POST http://localhost:8081/v1/shards/1/propose \
#        -d '{"command":"eyJvcCI6InNldCIsImtleSI6ImZvbyIsInZhbHVlIjoiYmFyIn0="}'
#
#   # Confirm in Redis directly
#   docker exec -it dragonboat-redis1 redis-cli GET "db:1:foo"
#   # → "bar"
#
# ── Simulate a node failure ───────────────────────────────────────────────────
#
#   docker compose stop node3 redis3  # kill node + its Redis (quorum = 2/3)
#   curl -X POST http://localhost:8081/v1/shards/1/propose ...  # still works
#   docker compose start redis3 node3  # node auto-rejoins; Raft replays state
#
# ── Scale out (add node4) ─────────────────────────────────────────────────────
#
#   docker compose --profile scale-out up node4 redis4 -d
#   curl -X POST http://localhost:8081/v1/shards/1/replicas \
#        -d '{"replica_id": 4, "target": "nhid-44444444-4444-4444-4444-444444444444"}'
#
# ── Notes ─────────────────────────────────────────────────────────────────────
#  - Each node's Redis is NOT shared with other nodes. Sharing would bypass Raft.
#  - Redis AOF/RDB persistence is disabled. Raft is the source of truth.
#    On restart Redis is empty; the state machine recovers from a Raft snapshot.
#  - --initial-members only matters on first boot. Subsequent restarts auto-recover.

version: "3.9"

x-common: &common
  build:
    context: ..
    dockerfile: deployments/Dockerfile
  restart: on-failure:5
  networks:
    - raftnet

x-redis: &redis
  image: redis:7-alpine
  restart: on-failure:5
  networks:
    - raftnet
  # AOF and RDB disabled — Raft is the source of truth.
  command: redis-server --save "" --appendonly no

x-gossip-seeds: &seeds "node1:63002,node2:63002,node3:63002"

services:

  # ── Redis sidecars (one per node) ───────────────────────────────────────────
  redis1:
    <<: *redis
    container_name: dragonboat-redis1
    ports:
      - "6379:6379"   # expose for redis-cli / RedisInsight inspection

  redis2:
    <<: *redis
    container_name: dragonboat-redis2
    ports:
      - "6380:6379"

  redis3:
    <<: *redis
    container_name: dragonboat-redis3
    ports:
      - "6381:6379"

  # ── Node 1 ──────────────────────────────────────────────────────────────────
  node1:
    <<: *common
    hostname: node1
    container_name: dragonboat-node1
    depends_on: [redis1]
    volumes:
      - node1-data:/data
    ports:
      - "8080:8080"   # gRPC  (primary endpoint)
      - "8081:8081"   # REST  (primary endpoint)
    environment:
      DRAGONBOAT_GOSSIP: "true"
      DRAGONBOAT_NODE_HOST_ID: "nhid-11111111-1111-1111-1111-111111111111"
      DRAGONBOAT_GOSSIP_SEEDS: *seeds
      REDIS_ADDR: "redis1:6379"
    command: >
      --node-id=1
      --shard-id=1
      --raft-addr=node1:63001
      --gossip-addr=0.0.0.0:63002
      --gossip-advertise=node1:63002
      --grpc-addr=:8080
      --rest-addr=:8081
      --data-dir=/data
      --rtt-ms=5
      --initial-members=1=nhid-11111111-1111-1111-1111-111111111111,2=nhid-22222222-2222-2222-2222-222222222222,3=nhid-33333333-3333-3333-3333-333333333333

  # ── Node 2 ──────────────────────────────────────────────────────────────────
  node2:
    <<: *common
    hostname: node2
    container_name: dragonboat-node2
    depends_on: [redis2]
    volumes:
      - node2-data:/data
    ports:
      - "8082:8080"   # gRPC
      - "8083:8081"   # REST
    environment:
      DRAGONBOAT_GOSSIP: "true"
      DRAGONBOAT_NODE_HOST_ID: "nhid-22222222-2222-2222-2222-222222222222"
      DRAGONBOAT_GOSSIP_SEEDS: *seeds
      REDIS_ADDR: "redis2:6379"
    command: >
      --node-id=2
      --shard-id=1
      --raft-addr=node2:63001
      --gossip-addr=0.0.0.0:63002
      --gossip-advertise=node2:63002
      --grpc-addr=:8080
      --rest-addr=:8081
      --data-dir=/data
      --rtt-ms=5
      --initial-members=1=nhid-11111111-1111-1111-1111-111111111111,2=nhid-22222222-2222-2222-2222-222222222222,3=nhid-33333333-3333-3333-3333-333333333333

  # ── Node 3 ──────────────────────────────────────────────────────────────────
  node3:
    <<: *common
    hostname: node3
    container_name: dragonboat-node3
    depends_on: [redis3]
    volumes:
      - node3-data:/data
    ports:
      - "8084:8080"   # gRPC
      - "8085:8081"   # REST
    environment:
      DRAGONBOAT_GOSSIP: "true"
      DRAGONBOAT_NODE_HOST_ID: "nhid-33333333-3333-3333-3333-333333333333"
      DRAGONBOAT_GOSSIP_SEEDS: *seeds
      REDIS_ADDR: "redis3:6379"
    command: >
      --node-id=3
      --shard-id=1
      --raft-addr=node3:63001
      --gossip-addr=0.0.0.0:63002
      --gossip-advertise=node3:63002
      --grpc-addr=:8080
      --rest-addr=:8081
      --data-dir=/data
      --rtt-ms=5
      --initial-members=1=nhid-11111111-1111-1111-1111-111111111111,2=nhid-22222222-2222-2222-2222-222222222222,3=nhid-33333333-3333-3333-3333-333333333333

  # ── Node 4 (disabled — scale-out example) ───────────────────────────────────
  redis4:
    <<: *redis
    container_name: dragonboat-redis4
    profiles: ["scale-out"]
    ports:
      - "6382:6379"

  node4:
    <<: *common
    hostname: node4
    container_name: dragonboat-node4
    profiles: ["scale-out"]
    depends_on: [redis4]
    volumes:
      - node4-data:/data
    ports:
      - "8086:8080"
      - "8087:8081"
    environment:
      DRAGONBOAT_GOSSIP: "true"
      DRAGONBOAT_NODE_HOST_ID: "nhid-44444444-4444-4444-4444-444444444444"
      DRAGONBOAT_GOSSIP_SEEDS: *seeds
      REDIS_ADDR: "redis4:6379"
    command: >
      --node-id=4
      --shard-id=1
      --raft-addr=node4:63001
      --gossip-addr=0.0.0.0:63002
      --gossip-advertise=node4:63002
      --grpc-addr=:8080
      --rest-addr=:8081
      --data-dir=/data
      --rtt-ms=5
      --join

networks:
  raftnet:
    driver: bridge

volumes:
  node1-data:
  node2-data:
  node3-data:
  node4-data:
